<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Festive Celebration RSVP</title>
   <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #3056c4;
            --primary-red: #ea3632;
            --bg-color: #f3f4f6;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Space Grotesk', sans-serif;
            /* Recreating the subtle blue/white gradient background */
            background: radial-gradient(circle at top right, #d9e6f9 0%, #f3f4f6 40%, #e2effa 100%);
            color: var(--primary-blue);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 40px 20px;
            text-align: center;
            box-sizing: border-box;
        }

        /* --- Header Styling --- */
        .badge-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
        }

        .year-badge {
            background-color: var(--primary-red);
            color: white;
            font-weight: 900;
            font-size: 18px;
            padding: 8px 24px;
            transform: rotate(-5deg);
            border-radius: 20px;
            /* Approximating the jagged edge with a dashed border effect */
            border: 2px dashed white;
            box-shadow: 0 0 0 3px var(--primary-red);
        }

        .subtitle {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            margin: 15px 0 5px 0;
        }

        .title {
            font-size: 32px;
            font-weight: 900;
            line-height: 1.1;
            margin: 0 0 10px 0;
            text-transform: uppercase;
        }

        .asterisk {
            color: var(--primary-red);
            font-size: 40px;
            line-height: 0.5;
            margin: 10px 0;
        }

        .rsvp-title {
            font-size: 24px;
            font-weight: 900;
            margin: 10px 0;
        }

        .intro-text {
            font-size: 12px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        /* --- Map Placeholder --- */
        .map-placeholder {
            width: 100%;
            height: 150px;
            background-color: #e5e9db;
            border-radius: 15px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
            border: 2px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        
        /* Simple CSS lines to mimic map streets */
        .map-placeholder::before { content: ""; position: absolute; top: 30%; left: -10%; width: 120%; height: 15px; background: #96c8eb; transform: rotate(15deg); }
        .map-placeholder::after { content: ""; position: absolute; top: 10%; left: 40%; width: 15px; height: 120%; background: #fae473; transform: rotate(-30deg); }

        /* --- Form & Funnel Layout --- */
        .form-header {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 40px;
        }

        .input-wrapper {
            position: relative;
        }

        /* The Funnel Widths */
        .w-100 { width: 95%; max-width: 380px; }
        .w-80  { width: 80%; max-width: 320px; }
        .w-65  { width: 65%; max-width: 260px; }
        .w-50  { width: 50%; max-width: 200px; }

        input, select {
            width: 100%;
            padding: 20px 15px 10px 15px;
            border: 3px solid var(--primary-blue);
            border-radius: 10px;
            background-color: transparent;
            color: var(--primary-blue);
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
            -webkit-appearance: none; /* Removes default iOS styling */
        }

        /* Recreating the floating label inside the top left of the box */
        .floating-label {
            position: absolute;
            top: 6px;
            left: 12px;
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            pointer-events: none;
        }

        /* --- Submit Button --- */
        .submit-btn {
            background-color: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 0;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
            transition: background 0.3s;
        }
        
        .submit-btn:hover {
            background-color: #1e3c8f;
        }

        /* --- Footer Info --- */
        .footer-info {
            font-weight: 900;
            letter-spacing: 1px;
        }
        .footer-date { font-size: 28px; margin: 5px 0; }
        .footer-time { font-size: 24px; margin: 5px 0 20px 0; }
        .footer-dress { font-size: 20px; font-style: italic; margin: 0; line-height: 1.2; }
        .footer-ig { font-size: 12px; font-weight: 400; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    
    <!-- Header -->
    <div class="badge-wrapper">
        <div class="year-badge">2026</div>
    </div>
    <div class="subtitle">YOU ARE INVITED</div>
    <h1 class="title">FESTIVE<br>CELEBRATION</h1>
    <div class="asterisk">✽</div>
    <h2 class="rsvp-title">RSVP NOW</h2>
    <p class="intro-text">We look forward to celebrating this meaningful moment with you</p>

    <!-- Map Graphic -->
    <div class="map-placeholder"></div>

    <!-- RSVP Form -->
    <div class="form-header">CONFIRM YOUR ATTENDANCE</div>
    
    <form id="rsvpForm">
        
        <div class="input-wrapper w-100">
            <span class="floating-label">Full Name</span>
            <input type="text" id="name" required>
        </div>

        <div class="input-wrapper w-80">
            <span class="floating-label">Instagram</span>
            <input type="text" id="instagram" required>
        </div>

        <div class="input-wrapper w-65">
            <span class="floating-label">Mobile Phone</span>
            <input type="tel" id="phone" required>
        </div>

        <div class="input-wrapper w-50">
            <span class="floating-label">Will you attend?</span>
            <select id="attendance" required>
                <option value="" disabled selected></option>
                <option value="Yes">YES</option>
                <option value="No">NO</option>
            </select>
        </div>

        <!-- Sleek Submit Button matching the bottom funnel size -->
        <button type="submit" class="submit-btn w-50">Submit RSVP</button>
    </form>

    <!-- Footer Details -->
    <div class="footer-info">
        <div class="footer-date">12.12.2026</div>
        <div class="footer-time">09 AM - 3 PM</div>
        <div class="footer-dress">DRESS CODE:<br>BEST OUTFIT. HIGHEST CONFIDENCE</div>
        <div class="footer-ig">@love_gbk</div>
    </div>

</div>

<!-- Google Sheets Connection Logic -->
<script>
    // Paste your Google Apps Script Web App URL below
    const scriptURL = 'https://script.google.com/macros/s/AKfycby_beJZWNPpnF2hB8GfADItFzkUBSJI4S8y2RC6383I/dev';
    const form = document.getElementById('rsvpForm');
    const submitBtn = document.querySelector('.submit-btn');

    form.addEventListener('submit', e => {
        e.preventDefault();
        
        // Change button text while sending
        const originalText = submitBtn.innerText;
        submitBtn.innerText = "SENDING...";
        submitBtn.style.backgroundColor = "#ea3632"; // Turns red while loading
        
        const data = {
            name: document.getElementById('name').value,
            instagram: document.getElementById('instagram').value,
            phone: document.getElementById('phone').value,
            attendance: document.getElementById('attendance').value
        };

        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(() => {
            alert('Your RSVP has been submitted successfully!');
            form.reset();
            submitBtn.innerText = originalText;
            submitBtn.style.backgroundColor = "";
        })
        .catch(error => {
            console.error('Error!', error.message);
            alert('Something went wrong. Please try again.');
            submitBtn.innerText = originalText;
            submitBtn.style.backgroundColor = "";
        });
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Invitation & RSVP</title>
    <!-- This single line handles 90% of your mobile-friendly design automatically -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@exampledev/new.css@1.1.2/nw.css">
</head>
<body>

    <header>
        <h1>✨ Exclusive Community Gathering</h1>
        <p>Join us for an evening of networking, design talks, and community building.</p>
    </header>

    <main>
        <!-- Event Info Columns -->
        <section style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px;">
            <div>
                <h3>📅 Date & Time</h3>
                <p>Saturday, August 15, 2026<br>18:00 - 21:00 WIB</p>
            </div>
            <div>
                <h3>📍 Location</h3>
                <p><strong>The Design Hub Co.</strong><br>Sudirman, Central Jakarta</p>
            </div>
        </section>

        <hr>

        <!-- RSVP Form -->
        <section>
            <h2>Confirm Your Attendance</h2>
            <form id="rsvpForm">
                <p>
                    <label for="name">Full Name</label>
                    <input type="text" id="name" required style="width: 100%;">
                </p>
                <p>
                    <label for="phone">Mobile Phone (WhatsApp)</label>
                    <input type="tel" id="phone" placeholder="0812..." required style="width: 100%;">
                </p>
                <p>
                    <label for="instagram">Instagram Account</label>
                    <input type="text" id="instagram" placeholder="@username" required style="width: 100%;">
                </p>
                <p>
                    <label for="attendance">Will you attend?</label>
                    <select id="attendance" required style="width: 100%;">
                        <option value="">Select an option</option>
                        <option value="Yes">Yes, I'll be there!</option>
                        <option value="No">Sorry, I can't make it</option>
                    </select>
                </p>
                <button type="submit" style="width: 100%; padding: 12px; font-weight: bold;">Submit RSVP</button>
            </form>
        </section>
    </main>

<script>
    // Paste your exact Google Apps Script Web App URL below
    const scriptURL = 'YOUR_GOOGLE_WEB_APP_URL_HERE';
    const form = document.getElementById('rsvpForm');

    form.addEventListener('submit', e => {
        e.preventDefault();
        
        const data = {
            name: document.getElementById('name').value,
            phone: document.getElementById('phone').value,
            instagram: document.getElementById('instagram').value,
            attendance: document.getElementById('attendance').value
        };

        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(() => {
            alert('Awesome! Your RSVP has been recorded.');
            form.reset();
        })
        .catch(error => console.error('Error!', error.message));
    });
</script>

</body>
</html>
